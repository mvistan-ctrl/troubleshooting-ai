<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI IT Troubleshooting Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>

<body>
    <header>
        <h2>AI IT Troubleshooting Assistant</h2>
        <button id="themeToggle">🌙</button>
    </header>

    <main id="chat-container">
        <div id="chatbox"></div>
        <div id="typing" class="hidden">AI is typing...</div>
    </main>

    <footer>
        <input id="message" type="text" placeholder="Describe your IT issue...">
        <button id="sendBtn">Send</button>
    </footer>
</body>
</html>
